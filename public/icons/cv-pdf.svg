<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    <linearGradient id="pdfBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e03030"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <clipPath id="docClip">
      <path d="M8,4 L82,4 L116,38 L116,152 Q116,156 112,156 L8,156 Q4,156 4,152 L4,8 Q4,4 8,4 Z"/>
    </clipPath>
  </defs>

  <!-- Document body -->
  <path
    d="M8,4 L82,4 L116,38 L116,152 Q116,156 112,156 L8,156 Q4,156 4,152 L4,8 Q4,4 8,4 Z"
    fill="url(#docGrad)"
    filter="url(#shadow)"
  />

  <!-- Fold triangle -->
  <path d="M82,4 L82,38 L116,38 Z" fill="url(#foldGrad)"/>
  <path d="M82,4 L82,38 L116,38" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>

  <!-- Text lines -->
  <g clip-path="url(#docClip)" fill="rgba(80,80,80,0.55)">
    <rect x="16" y="52" width="52" height="5" rx="2.5"/>
    <rect x="16" y="64" width="80" height="3.5" rx="1.75"/>
    <rect x="16" y="72" width="76" height="3.5" rx="1.75"/>
    <rect x="16" y="80" width="82" height="3.5" rx="1.75"/>
    <rect x="16" y="92" width="44" height="4" rx="2"/>
    <rect x="16" y="102" width="78" height="3.5" rx="1.75"/>
    <rect x="16" y="110" width="72" height="3.5" rx="1.75"/>
    <rect x="16" y="118" width="80" height="3.5" rx="1.75"/>
    <rect x="16" y="126" width="60" height="3.5" rx="1.75"/>
    <rect x="16" y="134" width="74" height="3.5" rx="1.75"/>
  </g>

  <!-- PDF badge bar -->
  <path
    d="M4,134 L4,152 Q4,156 8,156 L112,156 Q116,156 116,152 L116,134 Z"
    fill="url(#pdfBadge)"
    clip-path="url(#docClip)"
  />

  <!-- PDF label -->
  <text
    x="60"
    y="150"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="13"
    font-weight="700"
    letter-spacing="1.5"
    fill="white"
    opacity="0.95"
  >PDF</text>

  <!-- Subtle border -->
  <path
    d="M8,4 L82,4 L116,38 L116,152 Q116,156 112,156 L8,156 Q4,156 4,152 L4,8 Q4,4 8,4 Z"
    fill="none"
    stroke="rgba(0,0,0,0.08)"
    stroke-width="1"
  />
</svg>
